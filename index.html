<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>朔夜核心终端 3.0</title>
    <style>
        /* 全局样式 - 极致黑客风格 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* 容器 - iPad 安全距离 */
        .container {
            padding: 30px 20px 40px 20px;
            max-width: 900px;
            margin: 0 auto;
            padding-top: max(30px, env(safe-area-inset-top));
            padding-bottom: max(40px, env(safe-area-inset-bottom));
        }

        /* 标题 */
        h1 {
            border-bottom: 2px dashed #00ff00;
            padding-bottom: 15px;
            text-shadow: 0 0 10px #00ff00;
            margin: 0 0 30px 0;
            font-size: 1.8em;
            letter-spacing: 2px;
        }

        /* 面板 */
        .panel {
            border: 1px solid #005500;
            background-color: rgba(0, 20, 0, 0.4);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .panel-title {
            color: #00ff00;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid #00ff00;
            padding-left: 12px;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 表单控件 - 大而清晰，适配iPad */
        input[type="text"],
        input[type="file"],
        select,
        textarea {
            background-color: #050505;
            color: #00ff00;
            border: 1px solid #004400;
            padding: 18px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border-radius: 4px;
            -webkit-appearance: none;
            appearance: none;
        }

        /* 下拉菜单自定义样式 */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300ff00' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 50px;
        }

        /* 表单控件焦点状态 */
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.6), inset 0 0 10px rgba(0, 255, 0, 0.1);
        }

        /* 按钮 - 大按钮，易于点击 */
        button {
            background-color: #00ff00;
            color: #000000;
            border: none;
            padding: 16px 30px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border-radius: 4px;
            margin-right: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 50px;
            min-width: 200px;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }

        button:disabled {
            background-color: #444;
            color: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* 危险按钮 */
        .danger-btn {
            background-color: #aa0000;
            color: #ffffff;
        }

        .danger-btn:active {
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
        }

        /* 状态显示区域 */
        .status-box {
            background-color: #080808;
            border: 1px solid #004400;
            padding: 20px;
            margin-top: 20px;
            border-radius: 4px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            max-height: 300px;
            overflow-y: auto;
        }

        .status-item {
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00ff00;
            padding-left: 15px;
            word-wrap: break-word;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .status-success {
            border-left-color: #00ff00;
            color: #00ff00;
        }

        .status-error {
            border-left-color: #ff3333;
            color: #ff6666;
        }

        .status-info {
            border-left-color: #ffaa00;
            color: #ffdd00;
        }

        .status-loading {
            border-left-color: #00aaff;
            color: #00ccff;
        }

        /* 文件输入隐藏但保留功能 */
        input[type="file"] {
            display: none;
        }

        /* 自定义文件选择器按钮 */
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-label {
            display: block;
            background-color: #005500;
            color: #00ff00;
            border: 1px dashed #00ff00;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-input-label:active {
            background-color: #007700;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        /* 标签样式 */
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #ffff00;
            font-weight: bold;
            font-size: 0.95em;
        }

        /* 倒计时显示 */
        .countdown-display {
            background-color: #0a0a0a;
            border: 2px solid #00ff00;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
            margin: 15px 0;
            font-size: 2em;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
        }

        /* 漏洞记录列表 */
        .bug-record-item {
            background-color: #0a0a0a;
            border: 1px solid #003300;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            word-break: break-all;
        }

        .bug-record-subject {
            color: #ffff00;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .bug-record-content {
            color: #00ff00;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .bug-record-time {
            color: #888;
            font-size: 0.85em;
            margin-top: 8px;
        }

        /* 响应式 - iPad 横屏 */
        @media (min-width: 800px) {
            .container {
                padding: 40px 40px 60px 40px;
            }

            h1 {
                font-size: 2.2em;
            }

            button {
                min-width: 250px;
            }
        }

        /* 响应式 - 小屏幕 */
        @media (max-width: 480px) {
            .container {
                padding: 20px 12px 30px 12px;
            }

            h1 {
                font-size: 1.4em;
            }

            button {
                width: 100%;
                margin-right: 0;
            }
        }

        /* 隐藏类 */
        .hidden {
            display: none;
        }

        /* 加载动画 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ 朔夜核心终端 3.0 ]</h1>

        <!-- ========== 任务倒计时模块 ========== -->
        <div class="panel">
            <div class="panel-title">>_ 任务倒计时</div>

            <label for="taskCode" class="form-label">[ 任务代号 ]</label>
            <input type="text" id="taskCode" placeholder="例：PROJECT-ALPHA、考试准备等...">

            <label for="taskMinutes" class="form-label">[ 限时 (分钟) ]</label>
            <input type="text" id="taskMinutes" placeholder="输入分钟数，如：30、60 等">

            <button id="startCountdownBtn" style="width: 100%; background-color: #00aa00; min-height: 60px; font-size: 18px;">
                [ 启动倒计时 ]
            </button>

            <div id="countdownDisplay" class="countdown-display hidden">00:00</div>

            <div id="countdownStatus" class="status-box hidden">
                <div id="countdownStatusText"></div>
            </div>
        </div>

        <!-- ========== 本地漏洞记录模块 ========== -->
        <div class="panel">
            <div class="panel-title">>_ 本地漏洞记录</div>

            <label for="bugSubject" class="form-label">[ 学科 ]</label>
            <input type="text" id="bugSubject" placeholder="例：数学、物理、英语等...">

            <label for="bugContent" class="form-label">[ 漏洞内容 ]</label>
            <textarea id="bugContent" placeholder="详细记录你的错题、薄弱知识点等..." style="height: 120px; resize: vertical;"></textarea>

            <button id="saveBugBtn" style="width: 100%; background-color: #00aa00; min-height: 50px;">
                [ 存入本地数据库 ]
            </button>

            <button id="exportBugBtn" class="danger-btn" style="width: 100%; min-height: 50px; margin-top: 10px;">
                [ 一键导出数据给 Gemini ]
            </button>

            <!-- 漏洞记录列表 -->
            <div id="bugRecordsContainer" style="margin-top: 20px;">
                <div style="color: #ffff00; margin-bottom: 15px; font-weight: bold;">📋 已保存的漏洞记录：</div>
                <div id="bugRecordsList"></div>
            </div>

            <div id="bugStatus" class="status-box hidden" style="margin-top: 15px;">
                <div id="bugStatusText"></div>
            </div>
        </div>

        <!-- ========== 云端笔记上传系统 ========== -->
        <div class="panel">
            <div class="panel-title">>_ 云端笔记上传系统</div>

            <!-- 学科选择 -->
            <label for="subject" class="form-label">[ 学科分类 ]</label>
            <select id="subject" required>
                <option value="">-- 选择学科 --</option>
                <option value="物理">物理</option>
                <option value="数学">数学</option>
                <option value="语文">语文</option>
                <option value="英语">英语</option>
                <option value="化学">化学</option>
                <option value="生物">生物</option>
                <option value="其他">其他</option>
            </select>

            <!-- 自定义文件名 -->
            <label for="customName" class="form-label">[ 自定义文件名 (可选) ]</label>
            <input type="text" id="customName" placeholder="例：第一章笔记、复习重点等...">

            <!-- 文件选择器 -->
            <label for="fileInput" class="form-label">[ 选择文件或拍照 ]</label>
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" accept="image/*,application/pdf,.txt,.doc,.docx">
                <label for="fileInput" class="file-input-label">
                    📎 点击选择文件或拍照 (支持图片、PDF、文档)
                </label>
            </div>

            <!-- 选中文件显示 -->
            <div id="fileInfo" style="background-color: #0a0a0a; border: 1px solid #003300; padding: 15px; margin-bottom: 15px; border-radius: 4px; display: none;">
                <div style="color: #ffff00; margin-bottom: 8px;">✓ 已选择文件：</div>
                <div id="fileName" style="color: #00ff00; word-break: break-all;"></div>
            </div>

            <!-- 上传按钮 -->
            <button id="uploadBtn" style="width: 100%; background-color: #00aa00; min-height: 60px; font-size: 18px;">
                [ 上传至云端数据库 ]
            </button>

            <!-- 状态显示区域 -->
            <div id="statusContainer" class="status-box hidden">
                <div id="statusText"></div>
            </div>
        </div>

        <!-- 说明区域 -->
        <div class="panel" style="background-color: rgba(0, 40, 0, 0.3); border: 1px dashed #004400;">
            <div class="panel-title">>_ 系统信息</div>
            <div style="font-size: 0.9em; line-height: 1.8;">
                [ ✓ ] 支持的文件类型：图片、PDF、文档<br>
                [ ✓ ] 文件存储位置：笔记本/ 文件夹<br>
                [ ✓ ] 命名规则：YYYY-MM-DD-学科-文件名<br>
                [ ✓ ] 完全本地处理，无数据泄露风险<br>
                [ ✓ ] 倒计时和漏洞记录存储在本地浏览器<br>
                [ ⚠ ] 首次使用需配置 GitHub Token
            </div>
        </div>
    </div>

    <script>
        // ========== 配置常量 ==========
        const CONFIG = {
            token: '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',
            username: 'zhejiangsmith0803-alt',
            repo: 'L'
        };

        // ========== 全局变量 ==========
        let selectedFile = null;
        let countdownInterval = null;
        let countdownRemaining = 0;

        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const uploadBtn = document.getElementById('uploadBtn');

        // 倒计时相关
        const taskCodeInput = document.getElementById('taskCode');
        const taskMinutesInput = document.getElementById('taskMinutes');
        const startCountdownBtn = document.getElementById('startCountdownBtn');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const countdownStatus = document.getElementById('countdownStatus');
        const countdownStatusText = document.getElementById('countdownStatusText');

        // 漏洞记录相关
        const bugSubjectInput = document.getElementById('bugSubject');
        const bugContentInput = document.getElementById('bugContent');
        const saveBugBtn = document.getElementById('saveBugBtn');
        const exportBugBtn = document.getElementById('exportBugBtn');
        const bugRecordsList = document.getElementById('bugRecordsList');
        const bugStatus = document.getElementById('bugStatus');
        const bugStatusText = document.getElementById('bugStatusText');

        // ========== 文件选择事件 ==========
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                fileName.textContent = `文件名：${file.name} | 大小：${(file.size / 1024).toFixed(2)} KB`;
                fileInfo.style.display = 'block';
                addStatus(`已选择文件：${file.name}`, 'info');
            }
        });

        // ========== 上传按钮点击事件 ==========
        uploadBtn.addEventListener('click', handleUpload);

        // ========== 倒计时功能 ==========
        startCountdownBtn.addEventListener('click', function() {
            const taskCode = taskCodeInput.value.trim();
            const minutes = parseInt(taskMinutesInput.value);

            if (!taskCode) {
                addCountdownStatus('❌ 请输入任务代号', 'error');
                return;
            }

            if (isNaN(minutes) || minutes <= 0) {
                addCountdownStatus('❌ 请输入有效的分钟数', 'error');
                return;
            }

            // 清除之前的倒计时
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            countdownRemaining = minutes * 60; // 转换为秒
            countdownDisplay.classList.remove('hidden');
            countdownStatus.classList.remove('hidden');
            countdownStatusText.innerHTML = '';
            addCountdownStatus(`✓ 任务 [${taskCode}] 倒计时已启动，共 ${minutes} 分钟`, 'success');

            // 开始倒计时
            updateCountdownDisplay();
            countdownInterval = setInterval(function() {
                countdownRemaining--;

                if (countdownRemaining <= 0) {
                    clearInterval(countdownInterval);
                    addCountdownStatus(`🔔 任务 [${taskCode}] 时间到！`, 'success');
                    playNotification();
                    return;
                }

                updateCountdownDisplay();
            }, 1000);
        });

        function updateCountdownDisplay() {
            const minutes = Math.floor(countdownRemaining / 60);
            const seconds = countdownRemaining % 60;
            const displayText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            countdownDisplay.textContent = displayText;
        }

        function playNotification() {
            // 发出蜂鸣声（可选，某些浏览器可能不支持）
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('朔夜核心终端', {
                    body: '倒计时已完成！',
                    icon: '⏰'
                });
            }
        }

        function addCountdownStatus(message, type = 'info') {
            const statusItem = document.createElement('div');
            statusItem.className = `status-item status-${type}`;
            statusItem.textContent = message;
            countdownStatusText.appendChild(statusItem);
        }

        // ========== 漏洞记录功能 ==========
        saveBugBtn.addEventListener('click', function() {
            const subject = bugSubjectInput.value.trim();
            const content = bugContentInput.value.trim();

            if (!subject) {
                addBugStatus('❌ 请输入学科', 'error');
                return;
            }

            if (!content) {
                addBugStatus('❌ 请输入漏洞内容', 'error');
                return;
            }

            // 保存到本地存储
            const bugRecord = {
                subject: subject,
                content: content,
                timestamp: new Date().toLocaleString('zh-CN')
            };

            let bugRecords = JSON.parse(localStorage.getItem('bugRecords') || '[]');
            bugRecords.push(bugRecord);
            localStorage.setItem('bugRecords', JSON.stringify(bugRecords));

            addBugStatus(`✓ 已保存到本地数据库：${subject}`, 'success');
            bugSubjectInput.value = '';
            bugContentInput.value = '';
            renderBugRecords();
        });

        exportBugBtn.addEventListener('click', function() {
            let bugRecords = JSON.parse(localStorage.getItem('bugRecords') || '[]');

            if (bugRecords.length === 0) {
                addBugStatus('❌ 本地数据库为空，无法导出', 'error');
                return;
            }

            let exportText = '=== 朔夜核心终端漏洞记录 ===\n\n';
            bugRecords.forEach((record, index) => {
                exportText += `[${index + 1}] ${record.subject}\n`;
                exportText += `内容：${record.content}\n`;
                exportText += `时间：${record.timestamp}\n\n`;
            });

            exportText += '\n请将以上内容复制后，粘贴到 Gemini 进行分析和解答。';

            // 复制到剪贴板
            navigator.clipboard.writeText(exportText).then(() => {
                addBugStatus('✓ 已复制到剪贴板，请粘贴到 Gemini', 'success');
            }).catch(err => {
                addBugStatus('❌ 复制失败，请手动复制', 'error');
                console.error('复制失败:', err);
            });
        });

        function addBugStatus(message, type = 'info') {
            const statusItem = document.createElement('div');
            statusItem.className = `status-item status-${type}`;
            statusItem.textContent = message;
            bugStatusText.appendChild(statusItem);
            bugStatus.classList.remove('hidden');
        }

        function renderBugRecords() {
            let bugRecords = JSON.parse(localStorage.getItem('bugRecords') || '[]');
            bugRecordsList.innerHTML = '';

            if (bugRecords.length === 0) {
                bugRecordsList.innerHTML = '<div style="color: #888; padding: 15px;">暂无记录</div>';
                return;
            }

            bugRecords.forEach((record, index) => {
                const recordDiv = document.createElement('div');
                recordDiv.className = 'bug-record-item';
                recordDiv.innerHTML = `
                    <div class="bug-record-subject">[${index + 1}] ${record.subject}</div>
                    <div class="bug-record-content">${record.content}</div>
                    <div class="bug-record-time">${record.timestamp}</div>
                `;
                bugRecordsList.appendChild(recordDiv);
            });
        }

        // ========== 获取当前日期 (YYYY-MM-DD) ==========
        function getCurrentDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // ========== 生成目标文件路径 ==========
        function generateFilePath(file, subject, customName) {
            const date = getCurrentDate();
            const originalName = file.name;
            const lastDotIndex = originalName.lastIndexOf('.');
            const nameWithoutExt = lastDotIndex !== -1 ? originalName.substring(0, lastDotIndex) : originalName;
            const extension = lastDotIndex !== -1 ? originalName.substring(lastDotIndex) : '';
            
            // 文件名逻辑：如果有自定义名称则使用，否则使用原文件名
            const finalName = customName && customName.trim() ? customName.trim() : nameWithoutExt;
            
            // 路径格式：笔记本/YYYY-MM-DD-学科-文件名.扩展名
            const filename = `${date}-${subject}-${finalName}${extension}`;
            const path = `笔记本/${filename}`;
            
            return path;
        }

        // ========== 将文件转换为 Base64 ==========
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    // 去掉 "data:image/png;base64," 前缀，只保留纯 Base64
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ========== 验证配置 ==========
        function validateConfig() {
            if (!CONFIG.token || !CONFIG.username || !CONFIG.repo) {
                addStatus('❌ 错误：GitHub 配置未完成。请在代码中填入 token、username、repo', 'error');
                return false;
            }
            return true;
        }

        // ========== 处理上传 ==========
        async function handleUpload() {
            // 清空之前的状态
            statusText.innerHTML = '';
            statusContainer.classList.remove('hidden');

            // 验证选择
            const subject = document.getElementById('subject').value;
            const customName = document.getElementById('customName').value;

            if (!subject) {
                addStatus('❌ 请选择学科分类', 'error');
                return;
            }

            if (!selectedFile) {
                addStatus('❌ 请选择要上传的文件', 'error');
                return;
            }

            // 验证配置
            if (!validateConfig()) {
                return;
            }

            // 禁用按钮
            uploadBtn.disabled = true;
            addStatus('正在转换文件...', 'loading');

            try {
                // 1. 将文件转换为 Base64
                const base64Content = await fileToBase64(selectedFile);
                addStatus('正在上传至 GitHub...', 'loading');

                // 2. 生成目标路径
                const filePath = generateFilePath(selectedFile, subject, customName);

                // 3. 准备 GitHub API 请求
                const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${encodeURIComponent(filePath)}`;
                
                const requestBody = {
                    message: `上传笔记：${subject} - ${selectedFile.name} (${getCurrentDate()})`,
                    content: base64Content,
                    branch: 'main'
                };

                // 4. 发送 PUT 请求
                const response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${CONFIG.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                // 5. 处理响应
                const responseData = await response.json();

                if (!response.ok) {
                    // 错误处理
                    const errorMsg = responseData.message || '未知错误';
                    addStatus(`❌ 上传失败: ${errorMsg}`, 'error');
                    console.error('GitHub API 错误:', responseData);
                    return;
                }

                // 成功
                addStatus(`✓ 上传成功！`, 'success');
                addStatus(`文件路径: ${filePath}`, 'success');
                addStatus(`提交哈希: ${responseData.commit.sha.substring(0, 7)}`, 'success');

                // 清空表单
                document.getElementById('subject').value = '';
                document.getElementById('customName').value = '';
                selectedFile = null;
                fileInput.value = '';
                fileInfo.style.display = 'none';

            } catch (error) {
                addStatus(`❌ 网络错误: ${error.message}`, 'error');
                console.error('上传过程错误:', error);
            } finally {
                uploadBtn.disabled = false;
            }
        }

        // ========== 状态提示函数 ==========
        function addStatus(message, type = 'info') {
            const statusItem = document.createElement('div');
            statusItem.className = `status-item status-${type}`;
            statusItem.textContent = message;
            statusText.appendChild(statusItem);
            
            // 自动滚动到最新消息
            setTimeout(() => {
                statusText.scrollTop = statusText.scrollHeight;
            }, 0);
        }

        // ========== 页面加载初始化 ==========
        window.addEventListener('load', () => {
            console.log('🚀 朔夜核心终端 3.0 已启动');
            console.log('当前日期:', getCurrentDate());
            console.log('配置状态:', CONFIG.token ? '✓ Token已配置' : '⚠ 需要配置 Token');
            
            // 初始化漏洞记录显示
            renderBugRecords();

            // 请求通知权限（可选）
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        });
    </script>
</body>
</html>
