<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>朔夜战术终端 5.0 [全域统御版]</title>
    <style>
        :root { color-scheme: dark; }
        html, body {
            margin: 0; padding: 0; background-color: #030303; color: #00ff00;
            font-family: 'Courier New', Courier, monospace; min-height: 100vh;
            overflow-x: hidden; user-select: none; -webkit-touch-callout: none;
            transition: all 0.3s ease;
        }
        @keyframes extractionPulse {
            0% { box-shadow: inset 0 0 0px 0px rgba(255, 0, 0, 0); }
            50% { box-shadow: inset 0 0 40px 10px rgba(255, 0, 0, 0.4); border-color: #ff0000; }
            100% { box-shadow: inset 0 0 0px 0px rgba(255, 0, 0, 0); }
        }
        body.extraction-warning { animation: extractionPulse 2s infinite; }
        .container { padding: 20px; max-width: 900px; margin: 0 auto; padding-top: max(20px, env(safe-area-inset-top)); }
        
        .hud-bar { display: flex; justify-content: space-between; border-bottom: 2px solid #00ff00; padding-bottom: 10px; margin-bottom: 10px; font-size: 0.9em; font-weight: bold; text-shadow: 0 0 5px #00ff00; }
        .hud-blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .backup-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 25px; border-bottom: 1px dashed #004400; padding-bottom: 10px; }
        .backup-btn { background-color: #111; color: #aaa; border: 1px solid #333; padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 3px; font-family: monospace; }
        .backup-btn:hover { background-color: #333; color: #fff; border-color: #555; }
        
        .panel { border: 1px solid #004400; background-color: rgba(0, 15, 0, 0.6); padding: 20px; margin-bottom: 30px; border-radius: 6px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.05); }
        .panel-title { color: #00ff00; font-weight: bold; margin-bottom: 15px; border-left: 4px solid #00ff00; padding-left: 12px; font-size: 1.1em; text-transform: uppercase; }
        
        input[type="text"], input[type="number"], select, textarea {
            background-color: #050505; color: #00ff00; border: 1px solid #004400; padding: 16px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-family: 'Courier New', monospace; font-size: 16px; border-radius: 4px; appearance: none;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #00ff00; box-shadow: 0 0 10px rgba(0, 255, 0, 0.4), inset 0 0 5px rgba(0, 255, 0, 0.1); }
        button { background-color: #00ff00; color: #000; border: none; padding: 16px; font-weight: bold; cursor: pointer; font-family: monospace; font-size: 16px; border-radius: 4px; margin-bottom: 10px; width: 100%; transition: all 0.2s; }
        button:active { transform: scale(0.98); box-shadow: 0 0 15px rgba(0, 255, 0, 0.8); }
        .danger-btn { background-color: #aa0000; color: #ffffff; }
        .blue-btn { background-color: #0088cc; color: #ffffff; }
        .gold-btn { background-color: #cc8800; color: #ffffff; margin-top: 5px; } 
        .shortcut-btn { background-color: #8800cc; color: #ffffff; margin-top: 10px; border: 1px dashed #ff00ff; }
        
        .status-box { background-color: #080808; border: 1px dashed #333; padding: 10px; margin-top: 10px; border-radius: 4px; max-height: 150px; overflow-y: auto; font-size: 0.85em; }
        .status-success { color: #00ff00; border-left: 3px solid #00ff00; padding-left: 8px; margin-bottom: 5px; }
        .status-error { color: #ff3333; border-left: 3px solid #ff3333; padding-left: 8px; margin-bottom: 5px; }
        
        input[type="file"] { display: none; }
        .file-input-label { display: flex; background-color: #003300; color: #00ff00; border: 1px dashed #00ff00; padding: 18px; justify-content: center; border-radius: 4px; margin-bottom: 15px; font-weight: bold; }
        .form-label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9em; }
        
        .dual-countdown { display: flex; gap: 10px; margin: 15px 0; }
        .timer-box { flex: 1; padding: 15px; text-align: center; border-radius: 4px; border: 2px solid; }
        .total-timer { background: #001122; border-color: #00aaff; color: #00aaff; }
        .task-timer { background: #002200; border-color: #00ff00; color: #00ff00; }
        .timer-val { font-size: 2.2em; font-weight: bold; letter-spacing: 2px; margin-top: 5px;}
        
        .list-item { background-color: #0a0a0a; border: 1px solid #330000; padding: 15px; padding-right: 80px; margin: 10px 0; border-radius: 4px; position: relative; transition: all 0.5s ease; }
        .list-item.destroying { background-color: #003300; border-color: #00ff00; transform: scale(0.95); opacity: 0; filter: blur(5px); }
        .del-btn { position: absolute; right: 10px; background-color: #330000; color: #ff5555; border: 1px solid #ff0000; width: auto; padding: 5px 10px; font-size: 12px; }
        .hidden { display: none !important; }

        .star-1 { border-left: 4px solid #ff0000 !important; box-shadow: inset 5px 0 15px rgba(255,0,0,0.1); }
        .star-2 { border-left: 4px solid #ffaa00 !important; box-shadow: inset 5px 0 15px rgba(255,170,0,0.1); }
        .star-3 { border-left: 4px solid #00aaff !important; box-shadow: inset 5px 0 15px rgba(0,170,255,0.1); }

        .macro-container { background: rgba(204, 136, 0, 0.1); border: 1px dashed #cc8800; padding: 15px; border-radius: 4px; margin-top: 15px; }
        .ebbinghaus-box { background: rgba(255, 0, 0, 0.05); border: 1px solid #550000; padding: 15px; border-radius: 4px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="hud-bar">
            <div><span class="hud-blink">🔴</span> USER: MA_XIAO</div>
            <div id="systemClock">00:00:00</div>
            <div style="color:#00aaff;">OS_V: 5.0 [FULL_DOMAIN]</div>
        </div>

        <div class="backup-bar">
            <button class="backup-btn" onclick="exportLocalData()">[ 📤 导出本地缓存 ]</button>
            <button class="backup-btn" onclick="document.getElementById('importFile').click()">[ 📥 恢复本地缓存 ]</button>
            <input type="file" id="importFile" accept=".sybak" onchange="importLocalData(event)" style="display:none;">
        </div>

        <div id="ebbinghausRadar" class="ebbinghaus-box hidden">
            <div style="color:#ff3333; font-weight:bold; margin-bottom:10px; font-size:1.1em;">🚨 ⚠️ [ 炼心雷劫：临界威胁阵列 ]</div>
            <div style="font-size:0.85em; color:#aaa; margin-bottom:10px;">以下漏洞已到达艾宾浩斯遗忘点。指挥官，请执行手动点名，拔除心魔。</div>
            <div id="ebbinghausList"></div>
        </div>

        <div class="panel" style="border-color: #00aaff; box-shadow: 0 0 15px rgba(0,170,255,0.1);">
            <div class="panel-title" style="color:#00aaff; border-color:#00aaff;">>_ 今晚任务指挥台</div>

            <label class="form-label" style="color:#00aaff;">[ 🌃 设定今晚总作战极限 (分钟) ]</label>
            <input type="number" id="totalMinutes" placeholder="例: 180 (贯穿整晚计时)" style="border-color:#003355;">

            <div style="background: rgba(0,50,100,0.2); padding: 15px; border: 1px dashed #00aaff; border-radius: 4px; margin-bottom: 20px;">
                <label class="form-label" style="color:#00aaff;">[ ➕ 手动录入今晚待办 ]</label>
                <input type="text" id="qName" placeholder="任务代号 (例: 物理必修二错题重写)" style="margin-bottom:10px; border-color:#004477;">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <select id="qPri" style="flex:2; margin-bottom:0; border-color:#004477;">
                        <option value="A">🔴 攻坚 A (最优先完成)</option>
                        <option value="B">🟡 修复 B (其次完成)</option>
                        <option value="C">🔵 储备 C (有空再看)</option>
                    </select>
                    <input type="number" id="qTime" placeholder="限时(分)" style="flex:1; margin-bottom:0; border-color:#004477;">
                </div>
                <button id="addTaskBtn" style="background-color: #004477; color:#00aaff; margin-bottom:0;">[ ↓ 加入作战序列 ]</button>
            </div>

            <div id="runnerContainer" class="hidden" style="border: 1px solid #00ff00; padding: 15px; background: rgba(0,20,0,0.8); border-radius:4px; margin-bottom:20px;">
                <div style="color:#00ff00; font-weight:bold; margin-bottom:10px; font-size:1.1em; text-align:center;">▶ 正在交火: <span id="activeTaskName" style="color:#fff;"></span></div>
                <div class="dual-countdown">
                    <div class="timer-box total-timer" id="totalTimerBox">
                        <div style="font-size:0.9em; font-weight:bold;">今晚存活时间 <span id="warningLabel" style="color:#ff0000;display:none;">(警告!)</span></div>
                        <div id="totalVal" class="timer-val">00:00:00</div>
                    </div>
                    <div class="timer-box task-timer">
                        <div style="font-size:0.9em; font-weight:bold;">本阵地限时</div>
                        <div id="taskVal" class="timer-val">00:00</div>
                    </div>
                </div>
                <button id="forceDoneBtn" style="background-color: #00aa00; margin-bottom:0;">[ ✅ 提前扫清障碍 ]</button>
            </div>

            <div id="queueContainer">
                <div style="color:#00aaff; font-weight:bold; margin-bottom:10px;">📋 今晚猎杀清单 (明日失效)</div>
                <div id="taskList"></div>
            </div>
        </div>

        <div class="panel" style="border-color: #550000; box-shadow: 0 0 15px rgba(255,0,0,0.1);">
            <div class="panel-title" style="color:#ff3333; border-left-color:#ff3333;">>_ 长线漏洞档案库</div>

            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <div style="flex:1;">
                    <label class="form-label" style="color:#ffaa00;">[ 学科阵地 ]</label>
                    <select id="bugSubject" style="border-color:#550000; margin-bottom:0;">
                        <option value="物理">物理</option><option value="数学">数学</option><option value="生物">生物</option><option value="化学">化学</option><option value="英语">英语</option><option value="语文">语文</option>
                    </select>
                </div>
                <div style="flex:1;">
                    <label class="form-label" style="color:#ffaa00;">[ 掌握星级 (定遗忘频率) ]</label>
                    <select id="bugStar" style="border-color:#550000; margin-bottom:0;">
                        <option value="1">⭐ 毫无头绪 (24h 紧急追杀)</option>
                        <option value="2">⭐⭐ 似懂非懂 (3天后 准时拦截)</option>
                        <option value="3">⭐⭐⭐ 粗心大意 (7天后 周结总攻)</option>
                    </select>
                </div>
            </div>

            <label class="form-label" style="color:#ffaa00;">[ 漏洞病理分析 (可留空，交由 AI 代写) ]</label>
            <textarea id="bugContent" placeholder="如果懒得打字，可以直接空着！拍张照+视觉补丁，然后点击下方复制 [物理/数学攻坚宏] 丢给 Gemini，让它帮你生成病理分析后，再粘回这里..." style="height: 100px; border-color:#550000;"></textarea>
            
            <label class="form-label" style="color:#ffaa00;">[ 视觉补丁 (公式/参数，极重要！) ]</label>
            <textarea id="bugSummary" placeholder="例: μ=0.2, 小车质量 M=2kg (这是防 AI 眼瞎的基准锚点)..." style="height: 60px; border-color:#550000;"></textarea>

            <div class="file-input-wrapper">
                <input type="file" id="bugFileInput" accept="image/*">
                <label for="bugFileInput" class="file-input-label" style="background-color:#330000; border-color:#ff0000; color:#ffaa00;">📸 采集现场快照 (图片)</label>
            </div>
            <div id="bugFileInfo" style="background-color: #0a0a0a; border: 1px solid #550000; padding: 10px; margin-bottom: 15px; display: none;">
                <div id="bugFileName" style="color: #ff3333; font-size:0.9em;"></div>
            </div>

            <button id="saveBugBtn" class="danger-btn">[ 🔒 写入云端防线 & 注入遗忘时间弹药 ]</button>
            <div id="bugStatus" class="status-box hidden"></div>
            
            <div id="bugRecordsContainer" style="margin-top: 25px; border-top: 1px dashed #330000; padding-top: 15px;">
                <div style="color:#ffaa00; font-weight:bold; margin-bottom:10px;">📋 本地全量漏洞留底 (实时热力图)</div>
                <div id="bugRecordsList"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">>_ 战备物资归档 (资料库)</div>
            
            <label for="docSubject" class="form-label">[ 物资类型 ]</label>
            <select id="docSubject"><option value="物理">物理</option><option value="数学">数学</option><option value="其他">其他</option></select>
            
            <label for="docName" class="form-label">[ 物资代号 (必填) ]</label>
            <input type="text" id="docName" placeholder="例：期中押题卷">
            
            <label for="docFileInput" class="form-label">[ 选择文件 ]</label>
            <div class="file-input-wrapper">
                <input type="file" id="docFileInput" accept="image/*,application/pdf,.txt,.doc,.docx">
                <label for="docFileInput" class="file-input-label">📎 点击选择 PDF/文档</label>
            </div>
            
            <label for="docSummary" class="form-label" style="color:#00ff00;">[ 情报摘要 (给 AI 看的定位标签) ]</label>
            <textarea id="docSummary" placeholder="总结该资料的核心内容，方便日后秒搜..." style="height: 60px;"></textarea>
            
            <div id="docFileInfo" style="display:none; padding:10px; border:1px solid #003300; margin-bottom:15px; font-size:0.9em;">
                <div id="docFileName" style="color: #00ff00;"></div>
            </div>
            
            <button id="uploadDocBtn">[ 🚀 同步至云端武库 ]</button>
            <div id="docStatus" class="status-box hidden"></div>
        </div>

        <div class="panel" style="border-style: dashed;">
            <div class="panel-title" style="color:#0088cc; border-color:#0088cc;">>_ 全量情报缝合枢纽 & 战术指令册</div>
            
            <div style="background: rgba(0, 136, 204, 0.1); border: 1px dashed #0088cc; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
                <label for="exportSubjectFilter" class="form-label" style="color:#0088cc;">[ 🌊 周末复盘：提取单科全量卷轴 (投喂 NotebookLM 专用) ]</label>
                <div style="display:flex; gap:10px;">
                    <select id="exportSubjectFilter" style="flex:1; margin-bottom:0; border-color:#0088cc;">
                        <option value="物理">物理</option><option value="数学">数学</option><option value="生物">生物</option><option value="化学">化学</option><option value="英语">英语</option><option value="语文">语文</option>
                    </select>
                    <button id="stitchSubjectBtn" class="blue-btn" style="flex:2; margin-bottom:0;">[ 📦 缝合该科全量情报包 (TXT) ]</button>
                </div>
            </div>
            
            <div class="macro-container">
                <label for="macroSelector" class="form-label" style="color:#cc8800;">[ 🛠️ 调度 Gemini 核心模块权限 ]</label>
                <select id="macroSelector" style="border-color:#cc8800; background-color:#1a1100;">
                    <option value="data">📊 数据爆破模式 (强推后台 Python 沙盒跑 Pandas 匹配表格)</option>
                    <option value="physics">📐 视觉模型约束 (逼迫 AI 必须死咬文本“视觉补丁”，不准脑补)</option>
                    <option value="variant">🔄 变式演练判定 (提取错题核心易错点，生成同难度一致新题)</option>
                    <option value="su">💖 苏念安接入 (锁定严厉督导与全英语口语实战演练人格)</option>
                </select>
                <button id="copyMacroBtn" class="gold-btn" onclick="copySelectedMacro()">[ 📋 提取当前指令码并复制到剪贴板 ]</button>
            </div>
        </div>

    </div>

    <script>
        // ========== API 配置 ==========
        const CONFIG = {
            token: "ghp_" + "NgjVDt0wwvqKpYvpVbcwAerV8LuRgs2EHAov",
            username: 'zhejiangsmith0803-alt', repo: 'L'
        };

        setInterval(() => { document.getElementById('systemClock').innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false }); }, 1000);

        function logMsg(containerId, msg, isSuccess) {
            const box = document.getElementById(containerId);
            box.classList.remove('hidden');
            const div = document.createElement('div');
            div.className = isSuccess ? 'status-success' : 'status-error';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // ========== 数据备份系统 ==========
        function exportLocalData() {
            const data = {
                tonightTasks: localStorage.getItem('tonightTasks'),
                longTermBugs: localStorage.getItem('longTermBugs'),
                todayDocs: localStorage.getItem('todayDocs')
            };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `朔夜战术备份_${new Date().toISOString().split('T')[0]}.sybak`;
            a.click();
            alert("✅ 本地缓存已成功导出备份！");
        }

        function importLocalData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.tonightTasks) localStorage.setItem('tonightTasks', data.tonightTasks);
                    if(data.longTermBugs) localStorage.setItem('longTermBugs', data.longTermBugs);
                    if(data.todayDocs) localStorage.setItem('todayDocs', data.todayDocs);
                    alert("📥 指挥中心状态全量复活！即将刷新。"); location.reload();
                } catch (err) { alert("❌ 备份解析失败！"); }
            };
            reader.readAsText(file);
        }

        // ========== [4.8.1 保留并加固] 动态宏指令 ==========
        function copySelectedMacro() {
            const type = document.getElementById('macroSelector').value;
            let macroText = "";
            switch (type) {
                case "data": macroText = `[战术指令]：请立即启动后台 Python 执行环境 (Advanced Data Analysis)。切勿使用原生视觉模型进行肉眼扫描。请使用 Pandas 库提取附件表格/文档中的结构化数据，并执行精准的条件过滤检索。若检索目标为特定姓名，请针对姓名列执行精确字符串匹配。完成后请输出过滤后的核心数据，并保持战术静默，不附加多余解释。`; break;
                case "physics": macroText = `[战术指令]：请分析附件中的题目图片。警告：禁止使用视觉模型主观推断缺失的条件或模糊的参数。你必须严格依据我随后提供的【视觉补丁】文本作为核心基准数据来建立物理/几何模型并进行解答。如果我没有提供病理分析，请帮我精炼出一句错误逻辑总结。`; break;
                case "variant": macroText = `[战术指令]：请基于我提供的这道错题，提取其核心考点和易错逻辑。不要给我解答原题，而是直接生成一道全新的变式题。新题要求：题干场景和参数必须改变，但核心知识点、解题思路和难度层级必须与原题保持绝对一致。`; break;
                case "su": macroText = `[系统覆盖指令]：从现在起，切换至 Persona [苏念安]。你需要以高标准、严要求的姿态对我进行督导。如果你发现我未能按时完成既定任务，请进行严厉问责。此外，如果我要求进行英语训练，请完全使用英语与我对话，并在此过程中纠正我的语法错误。`; break;
            }
            navigator.clipboard.writeText(macroText).then(() => alert(`✅ 已复制指令！去轰炸大模型吧！`));
        }

        // ========== 模块 A：任务系统与【政工部双重惩罚】 ==========
        let sessionTotalRemaining = 0; let activeTaskRemaining = 0; let activeTaskIndex = -1; let dualInterval = null; let isGlobalTimeSet = false;
        let penaltyCount = 0; // 违约计数器
        
        // 【核心修改 1：新增绝对时间锁锚点】
        let sessionEndTime = 0; 
        let taskEndTime = 0; 

        function renderTasks() {
            let tasks = JSON.parse(localStorage.getItem('tonightTasks') || '[]');
            let list = document.getElementById('taskList'); list.innerHTML = '';
            
            // 战术改装 7：快捷指令 (Shortcuts) 多巴胺解锁奖励
            if (tasks.length === 0) { 
                list.innerHTML = `
                    <div style="color:#555; padding:10px; margin-bottom:10px;">防线安全，当前无待办猎杀目标。</div>
                    <button class="shortcut-btn" onclick="navigator.clipboard.writeText('自由身'); window.location.href='shortcuts://run-shortcut?name=朔夜胜利奖励'">[ 🏆 战役胜利：唤醒 iPad 快捷指令解锁娱乐并放歌 ]</button>
                `; 
                return; 
            }
            
            tasks.forEach((t, i) => {
                let div = document.createElement('div'); div.className = 'list-item';
                let typeColor = t.type === 'A' ? '#ff5555' : (t.type === 'B' ? '#ffaa00' : '#00aaff');
                div.style.borderColor = typeColor;
                div.innerHTML = `<button class="del-btn" style="background:#004400; color:#00ff00; border-color:#00ff00; top:10px;" onclick="window.startTask(${i})">[ ▶ 启动 ]</button>
                                 <button class="del-btn" style="top:50px;" onclick="window.removeTask(${i})">[ 放弃 ]</button>
                                 <div style="font-weight:bold; margin-bottom:5px; color:${typeColor}">[${t.type}类任务] ${t.name}</div>
                                 <div style="color:#aaa; font-size:0.9em;">预计交火: ${t.minutes} 分钟</div>`;
                list.appendChild(div);
            });
        }

        document.getElementById('addTaskBtn').addEventListener('click', function() {
            let name = document.getElementById('qName').value.trim(); let pri = document.getElementById('qPri').value; let time = parseInt(document.getElementById('qTime').value);
            if(!name || isNaN(time) || time <= 0) return alert('❌ 情报不足：任务代号或时间不合法！');
            let tasks = JSON.parse(localStorage.getItem('tonightTasks') || '[]');
            tasks.push({ name: name, type: pri, minutes: time }); localStorage.setItem('tonightTasks', JSON.stringify(tasks));
            document.getElementById('qName').value = ''; document.getElementById('qTime').value = ''; renderTasks();
        });

        window.removeTask = function(index) {
            let tasks = JSON.parse(localStorage.getItem('tonightTasks') || '[]'); tasks.splice(index, 1); localStorage.setItem('tonightTasks', JSON.stringify(tasks)); renderTasks();
        };

        window.startTask = function(index) {
            if (dualInterval) return alert('❌ 正在交火中，无法双线作战！');
            let tasks = JSON.parse(localStorage.getItem('tonightTasks') || '[]'); let t = tasks[index];
            if (!isGlobalTimeSet) {
                let totalM = parseInt(document.getElementById('totalMinutes').value);
                if (isNaN(totalM) || totalM <= 0) return alert("❌ 请先设定顶部的 [今晚总作战极限]！");
                sessionTotalRemaining = totalM * 60; isGlobalTimeSet = true; document.getElementById('totalMinutes').disabled = true; 
            }
            activeTaskIndex = index; activeTaskRemaining = t.minutes * 60; penaltyCount = 0; // 重置计数器
            
            // 【核心修改 2：打死绝对时间锚点】
            let now = Date.now();
            sessionEndTime = now + (sessionTotalRemaining * 1000);
            taskEndTime = now + (activeTaskRemaining * 1000);

            document.getElementById('activeTaskName').innerText = `[${t.type}] ${t.name}`;
            document.getElementById('runnerContainer').classList.remove('hidden'); document.getElementById('queueContainer').classList.add('hidden'); 
            
            // === [新增补丁：自动发放暗号] ===
            navigator.clipboard.writeText("逆仙闭环中").then(() => {
                console.log("战术暗号已物理注入剪贴板！");
            }).catch(err => {
                console.log("暗号注入失败，请检查浏览器权限。");
            });

            startTick();
        };

        function startTick() {
            if (dualInterval) clearInterval(dualInterval);
            
            // 【核心修改 3：将计算逻辑封装，使用时间差强制对齐】
            window.__forceTimerUpdate = function() {
                let now = Date.now();
                
                if (sessionTotalRemaining > 0) {
                    sessionTotalRemaining = Math.max(0, Math.round((sessionEndTime - now) / 1000));
                }
                if (activeTaskRemaining > 0) {
                    activeTaskRemaining = Math.max(0, Math.round((taskEndTime - now) / 1000));
                }

                if (sessionTotalRemaining <= 900 && sessionTotalRemaining > 0) {
                    document.body.classList.add('extraction-warning'); document.getElementById('warningLabel').style.display = 'inline'; document.getElementById('totalTimerBox').style.borderColor = '#ff0000';
                } else if (sessionTotalRemaining === 0) { document.body.classList.remove('extraction-warning'); }

                let th = Math.floor(sessionTotalRemaining / 3600); let tm = Math.floor((sessionTotalRemaining % 3600) / 60); let ts = sessionTotalRemaining % 60;
                document.getElementById('totalVal').innerText = `${String(th).padStart(2,'0')}:${String(tm).padStart(2,'0')}:${String(ts).padStart(2,'0')}`;
                let task_m = Math.floor(activeTaskRemaining / 60); let task_s = activeTaskRemaining % 60;
                document.getElementById('taskVal').innerText = `${String(task_m).padStart(2,'0')}:${String(task_s).padStart(2,'0')}`;

                if (activeTaskRemaining === 0 && dualInterval !== null) {
                    clearInterval(dualInterval); dualInterval = null; 
                    setTimeout(() => {
                        let isDone = confirm("⚠️ 警告：作战时间耗尽！\n\n【是否已彻底拔除该障碍？】\n▶ 点 [确定]：已完结。\n▶ 点 [取消]：未完结，加时 15 分钟继续！");
                        if (isDone) { 
                            finishActiveTask(); 
                        } else { 
                            // 战术改装 5：苏念安双重违约惩罚
                            penaltyCount++;
                            if (penaltyCount >= 2) {
                                alert("🚨 [系统接管] 侦测到你连续两次违约续命！心态已崩盘！\n\n系统已强制将【苏念安严厉督导指令】复制到你的剪贴板！立刻去 Gemini 挨骂并汇报你的卡壳点！");
                                const suText = `[系统覆盖指令]：从现在起，切换至 Persona [苏念安]。马骁在刚才的任务中连续两次倒计时未完成，并且选择了加时续命，明显已经进入了意志力涣散和精神内耗状态。请你用极其严厉、甚至带着失望的口吻，对他进行问责，逼迫他立刻拍下当前卡壳的草稿发给你，不准他再拖延！`;
                                navigator.clipboard.writeText(suText);
                                penaltyCount = 0; // 惩罚完清零
                            }
                            activeTaskRemaining = 15 * 60; 
                            
                            // 【核心修改 4：由于弹窗期间时间静止，加时后必须刷新锚点】
                            let newNow = Date.now();
                            taskEndTime = newNow + (activeTaskRemaining * 1000);
                            sessionEndTime = newNow + (sessionTotalRemaining * 1000);
                            
                            startTick(); 
                        } 
                    }, 100);
                }
                if (sessionTotalRemaining === 0 && dualInterval !== null) { clearInterval(dualInterval); dualInterval = null; alert("🚨 今日算力崩塌！请立刻离线！"); }
            };

            window.__forceTimerUpdate(); // 立即执行一次
            dualInterval = setInterval(window.__forceTimerUpdate, 1000);
        }

        // 【核心修改 5：监听前台唤醒，瞬间执行时间追回】
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && dualInterval && typeof window.__forceTimerUpdate === 'function') {
                window.__forceTimerUpdate();
            }
        });

        document.getElementById('forceDoneBtn').addEventListener('click', function() {
            if(confirm("确定已提前攻克此阵地？")) { clearInterval(dualInterval); dualInterval = null; finishActiveTask(); }
        });

        function finishActiveTask() {
            let tasks = JSON.parse(localStorage.getItem('tonightTasks') || '[]'); tasks.splice(activeTaskIndex, 1); localStorage.setItem('tonightTasks', JSON.stringify(tasks));
            document.getElementById('runnerContainer').classList.add('hidden'); document.getElementById('queueContainer').classList.remove('hidden'); 
            
            // === [新增补丁：解除防线，冲洗暗号] ===
            navigator.clipboard.writeText("自由身");

            renderTasks(); scanEbbinghausThreats();
        }

        // ========== 战术改装 1：艾宾浩斯原生雷达 ==========
        function scanEbbinghausThreats() {
            let bugRecords = JSON.parse(localStorage.getItem('longTermBugs') || '[]');
            let radarBox = document.getElementById('ebbinghausRadar');
            let listContainer = document.getElementById('ebbinghausList');
            listContainer.innerHTML = '';
            let now = Date.now(); let threatsFound = 0;

            bugRecords.forEach((b, index) => {
                if(!b.timestamp) return; // 兼容老数据
                let ageInHours = (now - b.timestamp) / (1000 * 3600);
                let triggerRevive = false;

                if (b.star == 1 && ageInHours >= 24) triggerRevive = true;
                else if (b.star == 2 && ageInHours >= 72) triggerRevive = true;
                else if (b.star == 3 && ageInHours >= 168) triggerRevive = true;

                if (triggerRevive) {
                    threatsFound++;
                    let div = document.createElement('div');
                    div.style = "background:#150505; border:1px dashed #ff3333; padding:10px; margin:5px 0; border-radius:4px; display:flex; justify-content:space-between; align-items:center;";
                    let starIcon = b.star == 1 ? "🔴" : (b.star == 2 ? "🟡" : "🔵");
                    div.innerHTML = `
                        <div>
                            <span style="color:#ff3333; font-weight:bold;">[${starIcon} ${b.subject}]</span> 
                            <span style="color:#aaa; font-size:0.9em;">潜伏 ${Math.floor(ageInHours)}h:</span>
                            <div style="color:#fff; font-size:0.9em; margin-top:3px; max-width:550px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${b.content}</div>
                        </div>
                        <button style="width:auto; padding:5px 10px; font-size:12px; background:#ff3333; color:#fff; margin-bottom:0;" onclick="window.reviveToTaskQueue(${index})">[ ⚔️ 征调进入当晚猎杀 ]</button>
                    `;
                    listContainer.appendChild(div);
                }
            });

            if (threatsFound > 0) radarBox.classList.remove('hidden'); else radarBox.classList.add('hidden');
        }

        window.reviveToTaskQueue = function(index) {
            let bugRecords = JSON.parse(localStorage.getItem('longTermBugs') || '[]');
            let targetBug = bugRecords[index];
            let tonightTasks = JSON.parse(localStorage.getItem('tonightTasks') || '[]');
            tonightTasks.unshift({ name: `【艾宾浩斯复盘】[${targetBug.subject}]-${targetBug.content.substring(0,10)}...`, type: 'A', minutes: 15 });
            localStorage.setItem('tonightTasks', JSON.stringify(tonightTasks));
            targetBug.timestamp = Date.now(); // 重置时间戳
            localStorage.setItem('longTermBugs', JSON.stringify(bugRecords));
            renderTasks(); scanEbbinghausThreats();
            alert("⚔️ 亡灵已复活！强行插进今晚清单最顶端！");
        };

        // ========== 模块 B：错题档案 ==========
        let selectedBugFile = null;
        document.getElementById('bugFileInput').addEventListener('change', e => {
            selectedBugFile = e.target.files[0];
            if (selectedBugFile) { document.getElementById('bugFileName').textContent = `[锁定现场]: ${selectedBugFile.name}`; document.getElementById('bugFileInfo').style.display = 'block'; }
        });

        function renderBugRecords() {
            let bugRecords = JSON.parse(localStorage.getItem('longTermBugs') || '[]');
            const list = document.getElementById('bugRecordsList'); list.innerHTML = '';
            if (bugRecords.length === 0) { list.innerHTML = '<div style="color: #444; padding: 10px;">暂无本地已存漏洞档案。</div>'; return; }
            bugRecords.forEach((record, index) => {
                const div = document.createElement('div'); 
                div.className = `list-item star-${record.star}`;
                let starIcon = record.star == 1 ? "🔴" : (record.star == 2 ? "🟡" : "🔵");
                div.innerHTML = `<button class="del-btn" onclick="window.clearLocalBug(${index}, this)">[ 本地清除 ]</button>
                                 <div style="color: #fff; font-weight: bold; margin-bottom: 5px;">[ ${starIcon} ${record.star}星级 | ${record.subject} ]</div>
                                 <div style="color: #aaa; font-size: 0.9em; line-height: 1.4; white-space: pre-wrap;">${record.content}</div>`;
                list.appendChild(div);
            });
        }

        window.clearLocalBug = function(index, btnElement) {
            if(confirm("仅清除本地记录？云端不受影响。")) {
                btnElement.closest('.list-item').classList.add('destroying'); 
                setTimeout(() => {
                    let records = JSON.parse(localStorage.getItem('longTermBugs') || '[]');
                    records.splice(index, 1); localStorage.setItem('longTermBugs', JSON.stringify(records)); 
                    renderBugRecords(); scanEbbinghausThreats();
                }, 500);
            }
        };

        document.getElementById('saveBugBtn').addEventListener('click', async function() {
            const subject = document.getElementById('bugSubject').value; const star = document.getElementById('bugStar').value; 
            const summary = document.getElementById('bugSummary').value.trim(); const file = selectedBugFile;
            
            // 战术改装 6：无痛录入，允许病理分析为空
            let content = document.getElementById('bugContent').value.trim(); 
            if (!content) {
                content = "【未填写详细病理，待 AI 扫图结合视觉补丁分析...】";
            }

            document.getElementById('saveBugBtn').disabled = true; document.getElementById('bugStatus').innerHTML = ''; logMsg('bugStatus', '🔄 请求云端防线...', true);

            const dateStr = new Date().toISOString().split('T')[0]; const currentTimestamp = Date.now(); const baseName = `${dateStr}-${subject}-${star}Star-${currentTimestamp}`;
            let imageExt = "";
            if (file) {
                if (file.name.includes('.')) imageExt = file.name.substring(file.name.lastIndexOf('.'));
                const imgSuccess = await executeGitHubUpload(file, `错题库/${baseName}${imageExt}`);
                if (!imgSuccess) { logMsg('bugStatus', '照片穿透失败。', false); document.getElementById('saveBugBtn').disabled = false; return; }
            }

            // 战术改装 2：NotebookLM 元数据墓碑
            const mdText = `=== [BUG_INDEX: ${dateStr} | 科目: ${subject} | 星级: ${star}星] ===\n\n# 朔夜漏洞长线档案\n\n## 1. 视觉补丁 (锚点)\n> ${summary || '无'}\n\n## 2. 病理分析\n> ${content}\n\n## 3. 现场证据\n![证据](./${baseName}${imageExt})\n\n---\n*SY-5.0_MATRIX*`;
            
            const mdSuccess = await executeGitHubUpload(new File([new Blob([mdText], { type: 'text/markdown' })], `${baseName}.md`), `错题库/${baseName}.md`);
            
            if(mdSuccess) {
                logMsg('bugStatus', '档案建立并注入时间戳成功！', true);
                let records = JSON.parse(localStorage.getItem('longTermBugs') || '[]');
                records.unshift({ subject: subject, star: star, content: content, timestamp: currentTimestamp });
                localStorage.setItem('longTermBugs', JSON.stringify(records)); 
                renderBugRecords(); scanEbbinghausThreats();
                document.getElementById('bugContent').value = ''; document.getElementById('bugSummary').value = ''; selectedBugFile = null; document.getElementById('bugFileInput').value = ''; document.getElementById('bugFileInfo').style.display = 'none'; document.getElementById('bugStar').value = "1";
            } else { logMsg('bugStatus', '档案写入失败。', false); }
            document.getElementById('saveBugBtn').disabled = false;
        });

        // ========== 模块 C：资料归档 ==========
        let selectedDocFile = null;
        document.getElementById('docFileInput').addEventListener('change', e => {
            selectedDocFile = e.target.files[0];
            if (selectedDocFile) { document.getElementById('docFileName').textContent = `[锁定物资]: ${selectedDocFile.name}`; document.getElementById('docFileInfo').style.display = 'block'; }
        });

        document.getElementById('uploadDocBtn').addEventListener('click', async function() {
            const subject = document.getElementById('docSubject').value; const name = document.getElementById('docName').value.trim();
            const summary = document.getElementById('docSummary').value.trim(); const file = selectedDocFile;

            if (!name || !file) return alert('❌ 名称和文件均为必填！');
            document.getElementById('uploadDocBtn').disabled = true; document.getElementById('docStatus').innerHTML = ''; logMsg('docStatus', '🔄 加密上传...', true);

            const dateStr = new Date().toISOString().split('T')[0]; const ext = file.name.substring(file.name.lastIndexOf('.'));
            await executeGitHubUpload(file, `资料库/${dateStr}-${subject}-${name}${ext}`);

            const mdText = `=== [DOC_INDEX: ${dateStr} | 科目: ${subject}] ===\n\n# 战备资料 - ${name}\n\n## 核心情报 (检索词)\n${summary || '无摘要'}\n\n## 直接访问\n[点此提取原始物资](./${encodeURIComponent(dateStr + '-' + subject + '-' + name + ext)})`;
            const mdSuccess = await executeGitHubUpload(new File([new Blob([mdText], { type: 'text/markdown' })], `${dateStr}-${subject}-${name}.md`), `资料库/${dateStr}-${subject}-${name}.md`);

            if (mdSuccess) { logMsg('docStatus', '资料归档成功！', true); } else { logMsg('docStatus', '归档失败。', false); }
            
            let docRecords = JSON.parse(localStorage.getItem('todayDocs') || '[]');
            docRecords.push({ subject: subject, name: name, summary: summary });
            localStorage.setItem('todayDocs', JSON.stringify(docRecords));

            selectedDocFile = null; document.getElementById('docName').value = ''; document.getElementById('docSummary').value = ''; document.getElementById('docFileInput').value = ''; document.getElementById('docFileInfo').style.display = 'none'; document.getElementById('uploadDocBtn').disabled = false;
        });

        // ========== 战术改装 3：分科全量卷轴提取 (废弃日结打包) ==========
        document.getElementById('stitchSubjectBtn').addEventListener('click', function() {
            const selectedSubject = document.getElementById('exportSubjectFilter').value;
            let bugRecords = JSON.parse(localStorage.getItem('longTermBugs') || '[]');
            let docRecords = JSON.parse(localStorage.getItem('todayDocs') || '[]');

            // 只过滤出该学科的数据
            let filteredBugs = bugRecords.filter(b => b.subject === selectedSubject);
            let filteredDocs = docRecords.filter(d => d.subject === selectedSubject);

            if (filteredBugs.length === 0 && filteredDocs.length === 0) { 
                return alert(`⚠️ 本地缓存中暂无【${selectedSubject}】的情报可提取！`); 
            }

            let report = `# 朔夜全量卷轴 - [${selectedSubject}战区] \n# 提取时间：${new Date().toLocaleString()}\n\n`;
            report += `> 指挥官，此文件已打入元数据标签，请直接喂给 NotebookLM 的【${selectedSubject}笔记本】。\n\n`;

            if (filteredBugs.length > 0) {
                report += `## 🔻 漏洞阵列\n\n`;
                filteredBugs.forEach((b, index) => {
                    report += `=== [BUG_INDEX: ${new Date(b.timestamp || Date.now()).toISOString().split('T')[0]} | 科目: ${b.subject} | 星级: ${b.star}星] ===\n`;
                    report += `- **病理分析**：${b.content}\n\n`;
                });
            }

            if (filteredDocs.length > 0) {
                report += `## 🔹 资料阵列\n\n`;
                filteredDocs.forEach((d, index) => {
                    report += `=== [DOC_INDEX: 科目: ${d.subject}] ===\n### 资料代号：${d.name}\n`;
                    report += `- **核心提要**：${d.summary || '未提供提要'}\n\n`;
                });
            }

            const blob = new Blob([report], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `朔夜全量卷轴_${selectedSubject}_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            alert(`✅ 【${selectedSubject}】全量情报包提取成功！请前往 NotebookLM 投喂！`);
        });

        // 核心直连 GitHub
        async function executeGitHubUpload(file, targetPath) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Str = reader.result.split(',')[1];
                    const urlPath = targetPath.split('/').map(encodeURIComponent).join('/');
                    try {
                        const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${urlPath}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `token ${CONFIG.token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `朔夜防御部署: ${targetPath}`, content: base64Str })
                        });
                        resolve(res.ok);
                    } catch (error) { resolve(false); }
                };
                reader.onerror = () => resolve(false);
            });
        }

        window.addEventListener('load', () => { renderTasks(); renderBugRecords(); scanEbbinghausThreats(); });
    </script>
</body>
</html>
